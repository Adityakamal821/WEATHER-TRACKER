<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <style>
        body {
    background-color: #1a1c2c;
    color: #333;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 40px;
}
.title { color: white; text-align: center; margin-bottom: 30px; }
.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1000px;
    margin: 0 auto;
}
.card {
    background: #f0f0f0;
    padding: 25px;
    border-radius: 20px;
    min-height: 250px;
}
.search-section h3, .info-section h3 { margin-top: 0; color: #444; }
.search-box { display: flex; gap: 10px; margin-bottom: 20px; }
input { 
    flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; 
}
button { 
    background: #ff9a76; color: white; border: none; 
    padding: 10px 20px; border-radius: 8px; cursor: pointer; 
}
.chip {
    background: #ff9a76; color: white; padding: 5px 15px;
    border-radius: 20px; margin-right: 8px; font-size: 14px; display: inline-block;
}
.weather-icon { font-size: 80px; margin: 20px 0; }
.console-section {
    grid-column: span 2;
    background: #e0e0e0;
}
.console-box {
    background: #222;
    color: #4af626;
    padding: 15px;
    border-radius: 10px;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100px;
}
.log-entry { margin: 5px 0; }
    </style>
</head>
<body>

    <h1 class="title">☁️ Async Weather Tracker</h1>

    <div class="container">
        <div class="card search-section">
            <h3>Search City</h3>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="gurgaon">
                <button id="searchBtn">Search</button>
            </div>
            
            <h3>Search History</h3>
            <div id="history" class="history-container">
                <span class="chip">Mumbai</span>
                <span class="chip">Jaipur</span>
                <span class="chip">Delhi</span>
            </div>
        </div>

        <div class="card info-section">
            <h3>Weather Info</h3>
            <p><strong>City:</strong> <span id="cityName">---</span></p>
            <div class="weather-icon">🌫️</div>
            <div class="details">
                <p>Temperature: <span id="temp">--</span></p>
                <p>Condition: <span id="cond">--</span></p>
                <p>Humidity: <span id="hum">--</span></p>
            </div>
        </div>

        <div class="card console-section">
            <h3>Console – Event Loop</h3>
            <div id="consoleOut" class="console-box">
                <p class="cursor">|</p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = 'YOUR_API_KEY'; // Get from openweathermap.org
const searchBtn = document.getElementById('searchBtn');
const consoleOut = document.getElementById('consoleOut');

async function logToConsole(message) {
    const p = document.createElement('p');
    p.className = 'log-entry';
    p.innerText = `> ${message}`;
    consoleOut.appendChild(p);
}

searchBtn.addEventListener('click', async () => {
    const city = document.getElementById('cityInput').value;
    if (!city) return;

    // Simulate Event Loop Visualization
    consoleOut.innerHTML = ''; // Clear previous
    logToConsole("Click detected. Starting Async operation...");

    try {
        logToConsole(`Fetching data for ${city}... (Microtask added to Event Loop)`);
        
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);
        const data = await response.json();

        if (response.ok) {
            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = data.main.temp + "°C";
            document.getElementById('cond').innerText = data.weather[0].main;
            document.getElementById('hum').innerText = data.main.humidity + "%";
            
            logToConsole(`Success: Weather data for ${city} loaded.`);
        } else {
            logToConsole("Error: City not found.");
        }
    } catch (err) {
        logToConsole("Error: Network failure.");
    }
});
    </script>
</body>
</html>
